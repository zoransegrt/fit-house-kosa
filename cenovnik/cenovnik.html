<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cenovnik | Fit Kosa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="cenovnik.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="site-header" id="siteHeader">
      <div class="container header-inner">
        <a class="brand" href="index.html#pocetna" aria-label="Fit Kosa - početna">
          <span class="brand-logo-wrap" aria-hidden="true">
            <img class="brand-logo" src="/img/logo.png" alt="Fit Kosa logo" />
          </span>
        </a>

        <div class="header-center">
          <div class="menu" data-dropdown="nav">
            <button
              class="menu-btn"
              type="button"
              data-dropdown-trigger="nav"
              aria-label="Otvori navigaciju"
              aria-expanded="false"
            >
              <span class="menu-btn-line"></span>
              <span class="menu-btn-line"></span>
              <span class="menu-btn-line"></span>
            </button>

            <nav class="dropdown" data-dropdown-panel="nav" aria-label="Sekcije sajta">
              <a class="dropdown-link" href="/index.html">Početna</a>
              <a class="dropdown-link" href="index.html#o-nama">O&nbsp;nama</a>

              <!-- ACTIVE: Cenovnik -->
              <a class="dropdown-link is-active" href="cenovnik.html" aria-current="page">Cenovnik</a>

              <a class="dropdown-link" href="index.html#kontakt">Kontakt</a>
              <a class="dropdown-cta" href="index.html#postani-clan">Postani član</a>
            </nav>
          </div>
        </div>

        <div class="menu header-right" data-dropdown="lang">
          <button
            class="lang-btn"
            type="button"
            data-dropdown-trigger="lang"
            aria-label="Promeni jezik"
            aria-expanded="false"
          >
            <img class="lang-flag" src="/img/lang-sr.png" alt="Izabrani jezik" />
          </button>

          <div
            class="dropdown dropdown--lang"
            data-dropdown-panel="lang"
            role="menu"
            aria-label="Izbor jezika"
          >
            <button class="lang-option" type="button" data-lang="en" aria-label="Switch to English">
              <img class="lang-flag" src="/img/lang-en.png" alt="English" />
            </button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero" aria-label="Cenovnik - naslov">
        <div class="container">
          <h1 class="page-title">CENOVNIK</h1>
          <p class="page-subtitle">Izaberi paket koji ti najviše odgovara</p>
        </div>
      </section>
    </main>

    <script src="cenovnik.js"></script>
  </body>
</html>
